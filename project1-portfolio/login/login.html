<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign In</title>
    <link rel="stylesheet" href="login.css" />
    <script>
        if (localStorage.getItem('loggedIn')) {
            window.location.href = '../portfolio/portfolio.html';        }
    </script>
</head>

<body>
    <main class="login-wrapper">
        <div class="login-card">
                        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem">
                            <div>
                                <h2 style="margin:0">Sign in</h2>
                                <p class="meta-note" style="margin:0">Sign in to access the portfolio.</p>
                            </div>
                            <div>
                                <button id="darkModeBtn" class="theme-toggle dark-mode-btn" aria-label="Switch to dark mode">Dark Mode</button>
                                <button id="lightModeBtn" class="theme-toggle light-mode-btn hidden" aria-label="Switch to light mode">Light Mode</button>
                            </div>
                        </div>
            <form id="loginForm">
                <label>Username
                    <input type="text" id="loginUser" autocomplete="username" required />
                </label>
                <label>Password
                    <div class="password-field">
                        <input type="password" id="loginPass" autocomplete="current-password" required />
                        <button type="button" id="pwdToggle" class="pwd-toggle" aria-pressed="false" aria-label="Show password">Show</button>
                    </div>
                </label>
                <div id="loginError" class="error" aria-live="polite"></div>
                <div style="margin-top:1rem;display:flex;gap:.5rem;justify-content:flex-end">
                    <button type="submit" class="btn">Sign In</button>
                </div>
            </form>
        </div>
    </main>
    <script src="login.js"></script>
</body>

</html>
